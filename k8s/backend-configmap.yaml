apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: contact-record
data:
  SERVER_PORT: "8080"
  SPRING_JPA_HIBERNATE_DDL_AUTO: update
  SPRING_JPA_SHOW_SQL: "false"
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/contactdb
  APP_CORS_ALLOWED_ORIGINS: http://contact-record.localtest.me,https://contact-record.localtest.me
