apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: contact-record
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: postgres
  SPRING_DATASOURCE_PASSWORD: replace-with-the-postgres-password
  APP_JWT_SECRET: replace-with-a-long-random-base64-string
  APP_JWT_EXPIRATION: "86400000"
