name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  BACKEND_IMAGE_NAME: contact-record-backend
  FRONTEND_IMAGE_NAME: contact-record-frontend

jobs:
  validate:
    name: Validate Application
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate Kubernetes manifests
        run: kubectl kustomize k8s > /tmp/contact-record-manifests.yaml

      - name: Run backend tests
        working-directory: backend
        run: ./mvnw test

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  build-and-push:
    name: Build And Push Images
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: read

    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Define image tags
        id: meta
        run: |
          BACKEND_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}"
          FRONTEND_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}"
          echo "backend_image=$BACKEND_IMAGE" >> "$GITHUB_OUTPUT"
          echo "frontend_image=$FRONTEND_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_image }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:latest

  deploy:
    name: Deploy To Kubernetes
    runs-on:
      - self-hosted
      - linux
      - x64
    needs: build-and-push
    if: github.event_name != 'pull_request'
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Verify kubectl access
        run: kubectl get nodes

      - name: Apply Kubernetes manifests
        run: kubectl apply -k k8s/

      - name: Update backend image
        run: |
          kubectl set image deployment/backend \
            backend=${{ needs.build-and-push.outputs.backend_image }} \
            -n contact-record

      - name: Update frontend image
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ needs.build-and-push.outputs.frontend_image }} \
            -n contact-record

      - name: Wait for PostgreSQL rollout
        run: kubectl rollout status deployment/postgres -n contact-record --timeout=180s

      - name: Wait for backend rollout
        run: kubectl rollout status deployment/backend -n contact-record --timeout=300s

      - name: Wait for frontend rollout
        run: kubectl rollout status deployment/frontend -n contact-record --timeout=300s
